<!DOCTYPE html>
<html>
<head><meta charset="utf-8"/>
<style>body{background:#111;color:#fff;font-size:20px;padding:20px;font-family:sans-serif;}</style>
</head>
<body>
<p id="s">En attente...</p>
<button id="btn" style="padding:20px;font-size:20px;margin-top:20px;">Tester AR</button>
<script>
var s = document.getElementById('s');
if (!navigator.xr) {
  s.textContent = 'navigator.xr absent !';
} else {
  navigator.xr.isSessionSupported('immersive-ar').then(function(ok) {
    s.textContent = 'immersive-ar supporte: ' + ok;
  });
}
document.getElementById('btn').addEventListener('click', function() {
  s.textContent = 'Demande de session...';
  navigator.xr.requestSession('immersive-ar').then(function(session) {
    s.textContent = 'SESSION CREEE ! Mode: ' + session.mode;
    session.end();
  }).catch(function(e) {
    s.textContent = 'ECHEC: ' + e.name + ' - ' + e.message;
  });
});
</script>
</body>
</html>
