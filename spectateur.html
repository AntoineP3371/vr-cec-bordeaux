<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Assemblage CEC - Tableau de bord</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: #0d0f16; color: #fff;
    font-family: system-ui, sans-serif; display: flex; flex-direction: column;
    align-items: center; padding: 18px;
  }
  .logos { display: flex; align-items: center; justify-content: center; gap: 24px;
           background: #fff; border-radius: 14px; padding: 10px 20px; margin-bottom: 12px; }
  .logos img { height: 44px; width: auto; display: block; }
  .logos .sep { width: 2px; height: 36px; background: #ddd; }

  h1 { font-size: 22px; margin: 0 0 10px; letter-spacing: 1px; }

  #etat { display: flex; align-items: center; gap: 9px; font-size: 13px;
          color: #888; margin-bottom: 14px; }
  .pastille { width: 11px; height: 11px; border-radius: 50%; background: #c0392b; }
  .pastille.on { background: #27ae60; box-shadow: 0 0 10px #27ae60; }

  .grille { display: grid; grid-template-columns: 1fr 340px; gap: 16px;
            width: 100%; max-width: 1280px; }
  @media (max-width: 980px) { .grille { grid-template-columns: 1fr; } }

  .carte { background: #161a26; border-radius: 18px; padding: 20px 26px; }
  /* Hauteur imposee par la fenetre (jamais par le canvas) :
     le canvas ne doit pas influencer la mise en page, sinon boucle
     de redimensionnement -> clignotement */
  .carte.vue { padding: 0; overflow: hidden; position: relative;
               height: 72vh; min-height: 460px; }
  @media (max-width: 980px) { .carte.vue { height: 56vh; min-height: 380px; } }
  #vue3d { display: block; position: absolute; inset: 0;
           width: 100%; height: 100%; cursor: grab; }
  #vue3d:active { cursor: grabbing; }

  /* Bouton plein ecran */
  .btnPlein { position: absolute; top: 14px; right: 16px; z-index: 6;
              pointer-events: auto; cursor: pointer;
              background: rgba(30,36,52,.85); color: #cfd6e6;
              border: 1px solid #3a4258; border-radius: 9px;
              padding: 8px 14px; font-size: 13px; font-family: inherit; }
  .btnPlein:hover { background: #2c7fd4; color: #fff; }

  /* En plein ecran : tout est agrandi */
  .carte.vue:fullscreen { height: 100vh; min-height: 0; border-radius: 0; }
  .carte.vue:fullscreen .joueur { font-size: 52px; }
  .carte.vue:fullscreen .sousTitre { font-size: 20px; }
  .carte.vue:fullscreen .chrono { font-size: 132px; bottom: 96px; }
  .carte.vue:fullscreen .barreFond { height: 30px; }
  .carte.vue:fullscreen .progTxt { font-size: 24px; }

  .overlay { position: absolute; top: 0; left: 0; right: 0; padding: 18px 22px;
             pointer-events: none;
             background: linear-gradient(180deg, rgba(13,15,22,.92), rgba(13,15,22,0)); }
  .joueur { font-size: 30px; font-weight: 700; }
  .joueur.vide { color: #6b7385; font-size: 20px; font-weight: 400; }
  .sousTitre { color: #8b93a6; font-size: 13px; margin-top: 2px; }
  .chrono { position: absolute; bottom: 62px; left: 0; right: 0; text-align: center;
            font-size: 62px; font-weight: 700; font-family: ui-monospace, monospace;
            line-height: 1; letter-spacing: 2px; pointer-events: none;
            text-shadow: 0 3px 14px rgba(0,0,0,.85); }
  .chrono.marche { color: #ffd54a; }
  .chrono.fini   { color: #27ae60; }
  .chrono.arret  { color: #8b93a6; }
  .basVue { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 22px 16px;
            pointer-events: none;
            background: linear-gradient(0deg, rgba(13,15,22,.92), rgba(13,15,22,0)); }
  .barreFond { height: 20px; background: #0d0f16; border-radius: 10px; overflow: hidden; }
  .barre { height: 100%; width: 0%; border-radius: 10px;
           background: linear-gradient(90deg, #2c7fd4, #27ae60); }
  .progTxt { text-align: center; font-size: 15px; color: #b9c0d0; margin-top: 6px; }
  .aide { position: absolute; top: 52px; right: 16px; font-size: 11px; color: #5d6677;
          pointer-events: none; z-index: 5; }

  h2 { font-size: 16px; margin: 0 0 12px; color: #7a8296;
       text-transform: uppercase; letter-spacing: 2px; }
  table { width: 100%; border-collapse: collapse; font-size: 18px; }
  th { text-align: left; color: #6b7385; font-size: 12px; padding: 5px 10px;
       text-transform: uppercase; letter-spacing: 1px; }
  td { padding: 9px 10px; border-top: 1px solid #222735; }
  td.temps { text-align: right; font-family: ui-monospace, monospace; }
  tr.or  td { color: #ffd700; font-weight: 700; font-size: 21px; }
  tr.ag  td { color: #c8ccd6; }
  tr.br  td { color: #cd7f32; }
  .vide2 { color: #555; text-align: center; padding: 18px; font-size: 14px; }
</style>
</head>
<body>

  <div class="logos">
    <img src="logo-gmp.png" alt="IUT GMP Bordeaux" onerror="this.style.display='none'"/>
    <span class="sep"></span>
    <img src="logo-cec.png" alt="Course en Cours" onerror="this.style.display='none'"/>
  </div>

  <h1>ASSEMBLAGE CEC BORDEAUX</h1>
  <div id="etat"><span class="pastille" id="pastille"></span><span id="etatTxt">Connexion...</span></div>

  <div class="grille">
    <div class="carte vue">
      <canvas id="vue3d"></canvas>
      <div class="overlay">
        <div class="joueur vide" id="joueur">En attente d'un joueur</div>
        <div class="sousTitre" id="sousTitre">Le casque n'a pas encore demarre de session</div>
      </div>
      <button class="btnPlein" id="btnPlein">Plein ecran</button>
      <div class="aide">glisser = tourner &nbsp;|&nbsp; molette = zoom</div>
      <div class="chrono arret" id="chrono">00:00:00</div>
      <div class="basVue">
        <div class="barreFond"><div class="barre" id="barre"></div></div>
        <div class="progTxt" id="progTxt">0 / 0 piece posee</div>
      </div>
    </div>

    <div class="carte">
      <h2>Classement</h2>
      <div id="classement"><div class="vide2">Aucun score enregistre</div></div>
    </div>
  </div>

  <script src="three.min.js"></script>
  <script src="GLTFLoader.js"></script>
  <script src="supabase.min.js"></script>
  <script>
  (function () {
    var SB_URL  = 'https://ggmlfbxppgeivfvlxxrj.supabase.co';
    var SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdnbWxmYnhwcGdlaXZmdmx4eHJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNDY5NTIsImV4cCI6MjA5NzkyMjk1Mn0.HvPE2ewB8gFgVzj-xAb1YBxFfn8hTEwOwQLDfF1vgT0';
    var CANAL   = 'vr-cec-live';

    var elJoueur = document.getElementById('joueur');
    var elSous   = document.getElementById('sousTitre');
    var elChrono = document.getElementById('chrono');
    var elBarre  = document.getElementById('barre');
    var elProg   = document.getElementById('progTxt');
    var elClass  = document.getElementById('classement');
    var elPast   = document.getElementById('pastille');
    var elEtat   = document.getElementById('etatTxt');

    // ---------- Etat recu ----------
    var etat = { nom:'', tempsMs:0, enMarche:false, posees:0, total:0,
                 enAR:false, termine:false, pose:false };
    var recuA      = 0;   // performance.now() du dernier message
    var dernierMsg = 0;   // Date.now() du dernier message

    function pad(n) { return n < 10 ? '0' + n : '' + n; }
    function formatTemps(t) {
      if (t < 0) t = 0;
      var cs = Math.floor((t % 1000) / 10);
      var s  = Math.floor(t / 1000) % 60;
      var m  = Math.floor(t / 60000);
      return pad(m) + ':' + pad(s) + ':' + pad(cs);
    }
    function esc(s) {
      return (s == null ? '' : String(s)).replace(/[&<>"']/g, function (c) {
        return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
      });
    }
    // N'ecrit dans le DOM que si la valeur change (evite le clignotement)
    function poser(el, prop, valeur) {
      if (el[prop] !== valeur) el[prop] = valeur;
    }

    // ---------- Scene 3D ----------
    var canvas3d = document.getElementById('vue3d');
    var renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    var scene  = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(45, 1, 0.01, 50);

    scene.add(new THREE.AmbientLight(0xffffff, 1.3));
    var dl = new THREE.DirectionalLight(0xffffff, 1.1);
    dl.position.set(1, 2, 1); scene.add(dl);

    // Repere equivalent a l'ancre du casque
    var plateau = new THREE.Group();
    scene.add(plateau);

    // Sol repere
    var grille = new THREE.GridHelper(1.6, 16, 0x2a3142, 0x1b2130);
    grille.position.y = -0.001;
    plateau.add(grille);

    var pieces3d = [];   // meshes pilotes par la diffusion
    var pretes   = false;

    // Manettes (spheres blanches, comme dans le casque)
    var mains = [];
    for (var mi = 0; mi < 2; mi++) {
      var main = new THREE.Mesh(
        new THREE.SphereGeometry(0.016, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );
      main.visible = false;
      plateau.add(main); mains.push(main);
    }
    // Position du joueur (tete)
    var tete = new THREE.Mesh(
      new THREE.ConeGeometry(0.035, 0.07, 4),
      new THREE.MeshBasicMaterial({ color: 0x4aa3df, transparent: true, opacity: 0.75 })
    );
    tete.visible = false;
    plateau.add(tete);

    var matFantome = new THREE.MeshBasicMaterial({
      color: 0x00e5ff, transparent: true, opacity: 0.18, depthWrite: false
    });

    function ajusterTaille(objet, cible) {
      var box = new THREE.Box3().setFromObject(objet);
      var t = new THREE.Vector3(); box.getSize(t);
      var maxDim = Math.max(t.x, t.y, t.z);
      if (maxDim > 0) objet.scale.setScalar(cible / maxDim);
    }

    // Meme chargement que le casque, pour que les indices de pieces correspondent
    new THREE.GLTFLoader().load('Voiture_CEC_Bordeaux.glb', function (gltf) {
      var root = gltf.scene;
      ajusterTaille(root, 0.3);
      plateau.add(root);
      root.position.set(0, 0.02, 0);
      root.updateMatrixWorld(true);

      var carRoot = root;
      while (carRoot.children.length === 1) carRoot = carRoot.children[0];
      var pieces = carRoot.children.slice();

      pieces.forEach(function (piece) {
        var fantome = piece.clone(true);
        fantome.position.copy(piece.position);
        fantome.quaternion.copy(piece.quaternion);
        fantome.scale.copy(piece.scale);
        carRoot.add(fantome);
        plateau.attach(fantome);
        fantome.traverse(function (d) { if (d.isMesh) { d.material = matFantome; d.renderOrder = -1; } });

        plateau.attach(piece);
        pieces3d.push(piece);
      });
      pretes = true;
    });

    // ---------- Camera orbitale (souris) ----------
    var orbite = { theta: 0.9, phi: 0.95, rayon: 1.05, cible: new THREE.Vector3(0, 0.06, 0) };
    function placerCamera() {
      var r = orbite.rayon, ph = orbite.phi, th = orbite.theta;
      camera.position.set(
        orbite.cible.x + r * Math.sin(ph) * Math.cos(th),
        orbite.cible.y + r * Math.cos(ph),
        orbite.cible.z + r * Math.sin(ph) * Math.sin(th)
      );
      camera.lookAt(orbite.cible);
    }
    var glisse = false, lastX = 0, lastY = 0;
    canvas3d.addEventListener('mousedown', function (e) { glisse = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mouseup', function () { glisse = false; });
    window.addEventListener('mousemove', function (e) {
      if (!glisse) return;
      orbite.theta -= (e.clientX - lastX) * 0.008;
      orbite.phi   -= (e.clientY - lastY) * 0.008;
      orbite.phi = Math.max(0.15, Math.min(1.5, orbite.phi));
      lastX = e.clientX; lastY = e.clientY;
    });
    canvas3d.addEventListener('wheel', function (e) {
      e.preventDefault();
      orbite.rayon = Math.max(0.4, Math.min(2.5, orbite.rayon + e.deltaY * 0.0012));
    }, { passive: false });

    // ATTENTION : ne jamais comparer canvas.width a clientWidth. Avec un pixelRatio
    // de 2, canvas.width vaut le double -> la condition serait toujours vraie et le
    // canvas serait recree a chaque image (clignotement). On memorise les dimensions.
    var dernierW = 0, dernierH = 0;
    // ---------- Plein ecran ----------
    var zoneVue = document.querySelector('.carte.vue');
    var btnPlein = document.getElementById('btnPlein');
    btnPlein.addEventListener('click', function () {
      try {
        if (document.fullscreenElement) document.exitFullscreen();
        else zoneVue.requestFullscreen();
      } catch (e) {}
    });
    document.addEventListener('fullscreenchange', function () {
      btnPlein.textContent = document.fullscreenElement ? 'Quitter le plein ecran' : 'Plein ecran';
    });

    function redimensionner() {
      var w = canvas3d.clientWidth, h = canvas3d.clientHeight;
      if (!w || !h) return;
      if (w !== dernierW || h !== dernierH) {
        dernierW = w; dernierH = h;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }
    }

    // ---------- Application des donnees recues ----------
    function appliquerGeometrie(m) {
      if (!pretes) return;
      if (m.p) {
        for (var i = 0; i < m.p.length && i < pieces3d.length; i++) {
          var a = m.p[i];
          pieces3d[i].position.set(a[0], a[1], a[2]);
          pieces3d[i].quaternion.set(a[3], a[4], a[5], a[6]);
        }
      }
      if (m.m) {
        for (var k = 0; k < 2 && k < m.m.length; k++) {
          var c = m.m[k];
          mains[k].position.set(c[0], c[1], c[2]);
          mains[k].visible = true;
        }
      }
      if (m.t) {
        tete.position.set(m.t[0], m.t[1], m.t[2]);
        tete.quaternion.set(m.t[3], m.t[4], m.t[5], m.t[6]);
        tete.visible = true;
      }
    }

    function majEtat(p) {
      dernierMsg = Date.now();
      recuA = performance.now();
      etat.nom      = p.nom || '';
      etat.tempsMs  = p.tempsMs || 0;
      etat.enMarche = !!p.enMarche;
      etat.posees   = p.posees || 0;
      etat.total    = p.total || 0;
      etat.enAR     = !!p.enAR;
      etat.termine  = !!p.termine;
      etat.pose     = !!p.pose;
      appliquerGeometrie(p);
    }

    function majClassement(p) {
      dernierMsg = Date.now();
      var scores = (p && p.scores) || [];
      if (!scores.length) {
        elClass.innerHTML = '<div class="vide2">Aucun score enregistre</div>';
        return;
      }
      var h = '<table><tr><th>#</th><th>Nom</th><th style="text-align:right">Temps</th></tr>';
      scores.forEach(function (s, i) {
        var cls = i === 0 ? 'or' : (i === 1 ? 'ag' : (i === 2 ? 'br' : ''));
        h += '<tr class="' + cls + '"><td>' + (i + 1) + '</td><td>' + esc(s.nom) +
             '</td><td class="temps">' + formatTemps(s.temps) + '</td></tr>';
      });
      elClass.innerHTML = h + '</table>';
    }

    // ---------- Boucle d'affichage (chrono fluide, sans clignotement) ----------
    function boucle() {
      requestAnimationFrame(boucle);

      // Chrono interpole localement entre deux messages
      var t = etat.tempsMs;
      if (etat.enMarche && recuA) t += (performance.now() - recuA);
      poser(elChrono, 'textContent', formatTemps(t));
      var clsChrono = 'chrono ' + (etat.termine ? 'fini' : (etat.enMarche ? 'marche' : 'arret'));
      poser(elChrono, 'className', clsChrono);

      poser(elJoueur, 'textContent', etat.nom || 'En attente d\'un joueur');
      poser(elJoueur, 'className', etat.nom ? 'joueur' : 'joueur vide');

      var sous;
      if (etat.termine)       sous = 'TERMINE ! Voiture entierement assemblee';
      else if (etat.enMarche) sous = 'Assemblage en cours...';
      else if (etat.pose)     sous = 'Voiture posee - chrono a l\'arret';
      else if (etat.enAR)     sous = 'En realite augmentee - placement de la voiture';
      else                    sous = 'Sur l\'ecran d\'accueil du casque';
      poser(elSous, 'textContent', sous);

      var pct = etat.total ? (etat.posees / etat.total * 100) : 0;
      poser(elBarre.style, 'width', pct.toFixed(1) + '%');
      poser(elProg, 'textContent', etat.posees + ' / ' + etat.total +
            (etat.total > 1 ? ' pieces posees' : ' piece posee'));

      redimensionner();
      placerCamera();
      renderer.render(scene, camera);
    }
    boucle();

    // ---------- Indicateur de connexion ----------
    setInterval(function () {
      var actif = (Date.now() - dernierMsg) < 5000;
      poser(elPast, 'className', 'pastille' + (actif ? ' on' : ''));
      if (actif) {
        poser(elEtat, 'textContent', 'Casque connecte');
      } else if (dernierMsg) {
        poser(elEtat, 'textContent', 'Casque silencieux depuis ' +
              Math.round((Date.now() - dernierMsg) / 1000) + ' s');
      }
    }, 1000);

    // ---------- Connexion Realtime ----------
    try {
      var client = supabase.createClient(SB_URL, SB_ANON);
      client.channel(CANAL)
        .on('broadcast', { event: 'etat' },       function (m) { majEtat(m.payload || {}); })
        .on('broadcast', { event: 'classement' }, function (m) { majClassement(m.payload || {}); })
        .subscribe(function (st) {
          if (st === 'SUBSCRIBED') poser(elEtat, 'textContent', 'En attente du casque...');
          else if (st === 'CHANNEL_ERROR' || st === 'TIMED_OUT')
            poser(elEtat, 'textContent', 'Erreur de connexion (' + st + ')');
        });
    } catch (e) {
      elEtat.textContent = 'Erreur : ' + e.message;
    }
  })();
  </script>
</body>
</html>
